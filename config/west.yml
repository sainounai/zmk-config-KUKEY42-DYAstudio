manifest:
  defaults:
    revision: v0.3
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: r-Keys-kbd
      url-base: https://github.com/r-Keys-kbd
    - name: caksoylar
      url-base: https://github.com/caksoylar
    - name: kot149
      url-base: https://github.com/kot149
  projects:
    - name: zmk
      remote: zmkfirmware
      import: app/west.yml
    - name: zmk-pmw3610-driver
      remote: r-Keys-kbd
      revision: main
    - name: zmk-rgbled-widget
      remote: caksoylar
    - name: zmk-mouse-gesture
      remote: kot149
      revision: v1
  self:
    path: config
