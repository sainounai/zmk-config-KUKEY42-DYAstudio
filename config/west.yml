manifest:
  defaults:
    revision: main
  remotes:
    - name: cormoran
      url-base: https://github.com/cormoran
    - name: r-Keys-kbd
      url-base: https://github.com/r-Keys-kbd
    - name: kot149
      url-base: https://github.com/kot149
  projects:
    # ZMK 本体（DYA Studio 対応 cormoran fork）
    - name: zmk
      remote: cormoran
      revision: v0.3-branch+dya
      import: app/west.yml

    # DYA Studio 用モジュール（cormoran）
    - name: zmk-module-ble-management
      remote: cormoran
      revision: main
    - name: zmk-module-battery-history
      remote: cormoran
      revision: main
    - name: zmk-module-settings-rpc
      remote: cormoran
      revision: main
    - name: zmk-module-runtime-input-processor
      remote: cormoran
      revision: main

    # KUKEY42 が元から使っているモジュール（これを消したのが今回の原因）
    - name: zmk-pmw3610-driver      # トラックボール(PMW3610)ドライバ
      remote: r-Keys-kbd
      revision: main
    - name: zmk-mouse-gesture       # mouse-gesture.dtsi / zip_mouse_gesture を提供
      remote: kot149
      revision: main
  self:
    path: config
